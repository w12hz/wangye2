    let flag = true;
        const mySwitch = () => {
            const preBox = document.querySelector('.pre-box');
            if (flag) {

                preBox.style.backgroundColor = '#dcd2dc';
            } else {
                preBox.style.transform = 'translateX(0%)';
                preBox.style.backgroundColor = '#c9d4df';
            }
            flag = !flag;
